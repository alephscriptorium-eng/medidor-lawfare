<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Medidor de Lawfare{% endblock %}</title>
  {% block meta %}{% endblock %}
  <script>
    (function(){try{var t=localStorage.getItem('ml-theme');document.documentElement.setAttribute('data-theme',t||'dark');}catch(e){document.documentElement.setAttribute('data-theme','dark');}})();
  </script>
  <link rel="stylesheet" href="{{ base_href }}assets/style.css">
</head>
<body class="newspaper">
  <header class="site-header">
    <div class="wrap">
      <div class="masthead">
        <p class="dateline">Centro de datos · Edición electrónica</p>
        <a href="{{ base_href }}index.html" class="brand">Medidor de Lawfare</a>
        <p class="site-tag">Registro público de mediciones</p>
      </div>
      <div class="header-rule" aria-hidden="true"></div>
      <div class="header-toolbar">
        <nav aria-label="Secciones">
          <a href="{{ base_href }}index.html">Catálogo</a>
          <span class="nav-sep" aria-hidden="true">|</span>
          <a href="{{ base_href }}artefacto.html">El artefacto</a>
          <span class="nav-sep" aria-hidden="true">|</span>
          <a href="{{ base_href }}../foss/index.html" class="foss-link">FOSS</a>
        </nav>
        <button type="button" id="theme-toggle" class="theme-toggle" aria-pressed="false">Modo claro</button>
      </div>
    </div>
  </header>
  <main class="wrap">
    {% block content %}{% endblock %}
  </main>
  <footer class="site-footer">
    <div class="wrap">
      <p class="footer-colophon">Medidor de Lawfare v{{ version }} · Registro de mediciones · <a href="{{ base_href }}../index.html">Inicio</a></p>
    </div>
  </footer>
  <script src="{{ base_href }}assets/theme.js"></script>
</body>
</html>
