<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Medidor de Lawfare{% endblock %}</title>
  {% block meta %}{% endblock %}
  <link rel="stylesheet" href="{{ base_href }}assets/style.css">
</head>
<body>
  <header class="site-header">
    <div class="wrap">
      <a href="{{ base_href }}index.html" class="brand">Medidor de Lawfare</a>
      <p class="site-tag">Centro de datos</p>
      <nav>
        <a href="{{ base_href }}index.html">Catálogo</a>
        <a href="{{ base_href }}artefacto.html">El artefacto</a>
        <a href="{{ base_href }}../foss/index.html" class="foss-link">Documentación FOSS</a>
      </nav>
    </div>
  </header>
  <main class="wrap">
    {% block content %}{% endblock %}
  </main>
  <footer class="site-footer">
    <div class="wrap">
      <p>Medidor de Lawfare v{{ version }} · Registro de mediciones · <a href="{{ base_href }}../index.html">Inicio</a></p>
    </div>
  </footer>
</body>
</html>
