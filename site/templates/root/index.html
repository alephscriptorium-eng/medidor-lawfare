<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ brand }}</title>
  <meta name="description" content="Artefacto de medición de lawfare y centro de datos de resultados publicados">
  <script>
    (function(){try{var t=localStorage.getItem('ml-theme');document.documentElement.setAttribute('data-theme',t||'dark');}catch(e){document.documentElement.setAttribute('data-theme','dark');}})();
  </script>
  <link rel="stylesheet" href="assets/style.css">
</head>
<body>
  <main class="wrap">
    <header class="page-top">
      <h1>{{ brand }}</h1>
      <p class="version">v{{ version }} · GPL-3.0</p>
      <button type="button" id="theme-toggle" class="theme-toggle" aria-pressed="false">Modo claro</button>
    </header>
    <p class="lead">Artefacto de cuantificación reproducible y registro público de sus mediciones.</p>
    <nav class="portals" aria-label="Portales">
      <a class="portal" href="prensa/index.html">
        <strong>Centro de datos</strong>
        <span>Catálogo de mediciones publicadas por el artefacto</span>
      </a>
      <a class="portal" href="foss/index.html">
        <strong>Artefacto (FOSS)</strong>
        <span>Documentación técnica, metodología y operación</span>
      </a>
    </nav>
    <footer>
      <p>Software libre · <a href="https://github.com/alephscriptorium-eng/medidor-lawfare">Repositorio</a></p>
    </footer>
  </main>
  <script src="assets/theme.js"></script>
</body>
</html>
